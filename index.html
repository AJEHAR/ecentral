<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eCentral">
  <meta name="application-name" content="eCentral">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>eCentral</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #ffffff;
      overflow: hidden;
      touch-action: manipulation;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      border: none;
      display: block;
    }
    #push-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1b4b;
      color: white;
      padding: 12px 20px;
      border-radius: 14px;
      font-family: sans-serif;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      max-width: 90vw;
      text-overflow: ellipsis;
      overflow: hidden;
      pointer-events: none;
    }
    #push-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbwe_vG0R0m6C0uAeBrBMeIFr4Mqi14zJwTr0DYO_jdw3Rv3E1FTR6WUcle3aYTTnXbv1w/exec"
    allowfullscreen>
  </iframe>

  <div id="push-toast"></div>

  <script>
    // ══════════════════════════════════════════
    // KONFIGURASI
    // ══════════════════════════════════════════
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe_vG0R0m6C0uAeBrBMeIFr4Mqi14zJwTr0DYO_jdw3Rv3E1FTR6WUcle3aYTTnXbv1w/exec';

    // ⚠️ VAPID KEY — mesti ambil dari Firebase Console:
    // Project Settings → Cloud Messaging → Web configuration → Key pair
    // Klik "Generate key pair" kalau belum ada, copy Public Key
    const VAPID_PUBLIC_KEY = 'bV0_4wUNztPHX5Hsys9ypcBMfsfbWQ2EO_iUCL5n4eU';

    // ══════════════════════════════════════════
    // HELPER
    // ══════════════════════════════════════════
    function showToast(msg, duration) {
      duration = duration || 3500;
      var t = document.getElementById('push-toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, duration);
    }

    function urlBase64ToUint8Array(base64String) {
      var padding = '='.repeat((4 - base64String.length % 4) % 4);
      var base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      var rawData = window.atob(base64);
      var arr     = new Uint8Array(rawData.length);
      for (var i = 0; i < rawData.length; i++) arr[i] = rawData.charCodeAt(i);
      return arr;
    }

    // Simpan SW registration untuk guna semula
    var _swReg = null;
    // Simpan userId semasa untuk handle PUSH_RENEW
    var _currentUserId = null;

    // ══════════════════════════════════════════
    // REGISTER SERVICE WORKER
    // ══════════════════════════════════════════
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/ecentral/sw.js')
          .then(function(reg) {
            _swReg = reg;
            console.log('[eCentral] SW registered:', reg.scope);

            // Hantar VAPID key ke SW supaya boleh handle pushsubscriptionchange
            var sw = reg.installing || reg.waiting || reg.active;
            if (sw) {
              sw.postMessage({ type: 'SET_VAPID_KEY', vapidKey: VAPID_PUBLIC_KEY });
            }
            // Hantar semula bila SW active
            navigator.serviceWorker.addEventListener('controllerchange', function() {
              if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ type: 'SET_VAPID_KEY', vapidKey: VAPID_PUBLIC_KEY });
              }
            });
          })
          .catch(function(e) { console.warn('[eCentral] SW failed:', e); });

        // Dengar mesej dari SW (untuk handle PUSH_RENEW)
        navigator.serviceWorker.addEventListener('message', function(event) {
          if (event.data && event.data.type === 'PUSH_RENEW' && _currentUserId) {
            console.log('[eCentral] SW minta renew subscription untuk userId:', _currentUserId);
            var url = GAS_URL + '?action=savePushToken'
                    + '&userId=' + encodeURIComponent(_currentUserId)
                    + '&sub='    + encodeURIComponent(event.data.sub);
            fetch(url).catch(function(e) { console.warn('[eCentral] Gagal renew token:', e); });
          }
        });
      });
    }

    // ══════════════════════════════════════════
    // INIT PUSH — dipanggil selepas login
    // ══════════════════════════════════════════
    async function initPush(userId) {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        console.warn('[eCentral] Push tidak disokong pada peranti ini.');
        return;
      }

      _currentUserId = userId;

      var permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        console.warn('[eCentral] Kebenaran notifikasi ditolak.');
        showToast('🔕 Notifikasi ditolak. Sila benarkan dalam tetapan browser.');
        return;
      }

      try {
        var reg = _swReg || await navigator.serviceWorker.ready;

        // Hantar VAPID key ke SW (setiap kali initPush dipanggil)
        if (reg.active) {
          reg.active.postMessage({ type: 'SET_VAPID_KEY', vapidKey: VAPID_PUBLIC_KEY });
        }

        var sub = await reg.pushManager.getSubscription();

        if (!sub) {
          console.log('[eCentral] Tiada subscription, buat baru...');
          sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
          });
        }

        console.log('[eCentral] Subscription endpoint:', sub.endpoint);

        // Hantar subscription ke GAS untuk disimpan
        var subStr = JSON.stringify(sub);
        var url = GAS_URL + '?action=savePushToken'
                + '&userId=' + encodeURIComponent(userId)
                + '&sub='    + encodeURIComponent(subStr);

        var resp = await fetch(url);
        var data = await resp.json();
        console.log('[eCentral] savePushToken response:', data);

        if (data.success) {
          showToast('🔔 Notifikasi jadual diaktifkan!');
        } else {
          console.warn('[eCentral] GAS gagal simpan token:', data);
        }

      } catch(err) {
        console.error('[eCentral] Gagal subscribe push:', err);
        showToast('⚠️ Gagal aktifkan notifikasi: ' + err.message);
      }
    }

    async function disablePush(userId) {
      _currentUserId = null;
      try {
        var reg = _swReg || await navigator.serviceWorker.ready;
        var sub = await reg.pushManager.getSubscription();
        if (sub) {
          await sub.unsubscribe();
          await fetch(GAS_URL + '?action=removePushToken&userId=' + encodeURIComponent(userId));
          showToast('🔕 Notifikasi dimatikan.');
        }
      } catch(e) {
        console.warn('[eCentral] Gagal disable push:', e);
      }
    }

    // ══════════════════════════════════════════
    // DENGAR MESEJ DARI GAS (dalam iframe)
    // ══════════════════════════════════════════
    window.addEventListener('message', function(event) {
      // Hanya terima dari Google domains
      if (!event.origin.includes('script.google.com') &&
          !event.origin.includes('googleusercontent.com')) return;

      var data = event.data;
      if (!data || typeof data !== 'object') return;

      if (data.type === 'PUSH_INIT' && data.userId) {
        initPush(data.userId);
      }
      if (data.type === 'PUSH_DISABLE') {
        disablePush(data.userId || '');
      }
    });
  </script>
</body>
</html>
