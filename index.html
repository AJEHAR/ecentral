<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eCentral">
  <meta name="application-name" content="eCentral">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>eCentral</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #ffffff;
      overflow: hidden;
      touch-action: manipulation;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      border: none;
      display: block;
    }
    #push-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1b4b;
      color: white;
      padding: 12px 20px;
      border-radius: 14px;
      font-family: sans-serif;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      max-width: 90vw;
      text-overflow: ellipsis;
      overflow: hidden;
      pointer-events: none;
    }
    #push-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #notif-btn-wrap {
      position: fixed;
      bottom: 80px;
      right: 16px;
      z-index: 9998;
      display: none;
    }
    #notif-btn {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 700;
      font-family: sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(124,58,237,0.4);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    #notif-btn:active {
      transform: scale(0.96);
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbwe_vG0R0m6C0uAeBrBMeIFr4Mqi14zJwTr0DYO_jdw3Rv3E1FTR6WUcle3aYTTnXbv1w/exec"
    allowfullscreen>
  </iframe>

  <div id="push-toast"></div>

  <!-- Butang aktifkan notifikasi — muncul selepas login -->
  <div id="notif-btn-wrap">
    <button id="notif-btn" onclick="handleNotifBtn()">
      🔔 Aktifkan Notifikasi
    </button>
  </div>

  <script>
    // ══════════════════════════════════════════
    // KONFIGURASI
    // ══════════════════════════════════════════
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwe_vG0R0m6C0uAeBrBMeIFr4Mqi14zJwTr0DYO_jdw3Rv3E1FTR6WUcle3aYTTnXbv1w/exec';

    // VAPID Public Key — dari Firebase Console:
    // Project Settings → Cloud Messaging → Web configuration → Key pair → Public Key
    const VAPID_PUBLIC_KEY = 'bV0_4wUNztPHX5Hsys9ypcBMfsfbWQ2EO_iUCL5n4eU';

    // ══════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════
    var _swReg         = null;   // SW registration
    var _currentUserId = null;   // userId yang sedang login

    // ══════════════════════════════════════════
    // HELPER
    // ══════════════════════════════════════════
    function showToast(msg, duration) {
      duration = duration || 3500;
      var t = document.getElementById('push-toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, duration);
    }

    function urlBase64ToUint8Array(base64String) {
      var padding = '='.repeat((4 - base64String.length % 4) % 4);
      var base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      var rawData = window.atob(base64);
      var arr     = new Uint8Array(rawData.length);
      for (var i = 0; i < rawData.length; i++) arr[i] = rawData.charCodeAt(i);
      return arr;
    }

    function sendVapidToSW() {
      if (_swReg && _swReg.active) {
        _swReg.active.postMessage({ type: 'SET_VAPID_KEY', vapidKey: VAPID_PUBLIC_KEY });
      }
    }

    // ══════════════════════════════════════════
    // REGISTER SERVICE WORKER
    // ══════════════════════════════════════════
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/ecentral/sw.js')
          .then(function(reg) {
            _swReg = reg;
            console.log('[eCentral] SW registered:', reg.scope);
            sendVapidToSW();

            // Hantar VAPID key bila SW active (install/update)
            if (reg.installing) {
              reg.installing.addEventListener('statechange', function() {
                if (this.state === 'activated') sendVapidToSW();
              });
            }
          })
          .catch(function(e) {
            console.warn('[eCentral] SW gagal register:', e);
          });

        // Hantar VAPID key bila SW bertukar (update)
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          sendVapidToSW();
        });

        // Dengar mesej dari SW (untuk handle PUSH_RENEW bila token expired)
        navigator.serviceWorker.addEventListener('message', function(event) {
          if (event.data && event.data.type === 'PUSH_RENEW' && _currentUserId) {
            console.log('[eCentral] SW minta renew subscription...');
            var url = GAS_URL + '?action=savePushToken'
                    + '&userId=' + encodeURIComponent(_currentUserId)
                    + '&sub='    + encodeURIComponent(event.data.sub);
            fetch(url).catch(function(e) {
              console.warn('[eCentral] Gagal renew token:', e);
            });
          }
        });
      });
    }

    // ══════════════════════════════════════════
    // INIT PUSH — dipanggil bila login
    // Tidak minta permission terus — tunjuk butang je
    // (browser moden block auto permission)
    // ══════════════════════════════════════════
    async function initPush(userId) {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        console.warn('[eCentral] Push tidak disokong pada peranti ini.');
        return;
      }

      _currentUserId = userId;
      console.log('[eCentral] initPush untuk userId:', userId);

      try {
        var reg = _swReg || await navigator.serviceWorker.ready;
        _swReg  = reg;
        sendVapidToSW();

        // Semak sama ada dah ada subscription
        var sub = await reg.pushManager.getSubscription();

        if (sub) {
          // Dah subscribe — terus simpan token (refresh / re-login)
          console.log('[eCentral] Subscription sedia ada:', sub.endpoint);
          var url = GAS_URL + '?action=savePushToken'
                  + '&userId=' + encodeURIComponent(userId)
                  + '&sub='    + encodeURIComponent(JSON.stringify(sub));
          var resp = await fetch(url);
          var data = await resp.json();
          console.log('[eCentral] Token disimpan semula:', data);
          // Butang tidak ditunjuk — dah aktif
          return;
        }

        // Belum subscribe — tunjuk butang untuk user tap
        console.log('[eCentral] Belum subscribe, tunjuk butang notifikasi.');
        document.getElementById('notif-btn-wrap').style.display = 'block';

      } catch(err) {
        console.error('[eCentral] initPush error:', err);
        // Tetap tunjuk butang supaya user boleh cuba semula
        document.getElementById('notif-btn-wrap').style.display = 'block';
      }
    }

    // ══════════════════════════════════════════
    // HANDLE TAP BUTANG NOTIFIKASI
    // Minta permission & subscribe — MESTI dari user gesture
    // ══════════════════════════════════════════
    async function handleNotifBtn() {
      // Sembunyikan butang terus
      document.getElementById('notif-btn-wrap').style.display = 'none';

      if (!_currentUserId) {
        showToast('⚠️ Sila log masuk dahulu.');
        return;
      }

      // Minta kebenaran notifikasi
      var permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        showToast('🔕 Notifikasi ditolak. Benarkan dalam tetapan browser.');
        console.warn('[eCentral] Permission ditolak:', permission);
        return;
      }

      try {
        var reg = _swReg || await navigator.serviceWorker.ready;
        _swReg  = reg;
        sendVapidToSW();

        console.log('[eCentral] Subscribe push...');
        var sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });

        console.log('[eCentral] Subscribe berjaya:', sub.endpoint);

        // Simpan token dalam GAS
        var url = GAS_URL + '?action=savePushToken'
                + '&userId=' + encodeURIComponent(_currentUserId)
                + '&sub='    + encodeURIComponent(JSON.stringify(sub));

        var resp = await fetch(url);
        var data = await resp.json();
        console.log('[eCentral] savePushToken response:', data);

        if (data.success) {
          showToast('🔔 Notifikasi jadual diaktifkan!');
        } else {
          showToast('⚠️ Gagal simpan token. Cuba lagi.');
          console.warn('[eCentral] GAS error:', data);
          // Tunjuk semula butang untuk retry
          document.getElementById('notif-btn-wrap').style.display = 'block';
        }

      } catch(err) {
        console.error('[eCentral] Subscribe gagal:', err);
        showToast('⚠️ Ralat: ' + err.message);
        // Tunjuk semula butang untuk retry
        document.getElementById('notif-btn-wrap').style.display = 'block';
      }
    }

    // ══════════════════════════════════════════
    // DISABLE PUSH — bila logout
    // ══════════════════════════════════════════
    async function disablePush(userId) {
      document.getElementById('notif-btn-wrap').style.display = 'none';
      _currentUserId = null;

      try {
        var reg = _swReg || await navigator.serviceWorker.ready;
        var sub = await reg.pushManager.getSubscription();
        if (sub) {
          await sub.unsubscribe();
          await fetch(GAS_URL + '?action=removePushToken&userId=' + encodeURIComponent(userId));
          console.log('[eCentral] Push dimatikan untuk userId:', userId);
          showToast('🔕 Notifikasi dimatikan.');
        }
      } catch(e) {
        console.warn('[eCentral] Gagal disable push:', e);
      }
    }

    // ══════════════════════════════════════════
    // DENGAR MESEJ DARI GAS (iframe)
    // GAS postMessage: { type:'PUSH_INIT', userId:'...' } bila login
    // GAS postMessage: { type:'PUSH_DISABLE' } bila logout
    // ══════════════════════════════════════════
    window.addEventListener('message', function(event) {
      // Terima dari Google domains
      var ok = event.origin.includes('script.google.com') ||
               event.origin.includes('googleusercontent.com');
      if (!ok) return;

      var data = event.data;
      if (!data || typeof data !== 'object') return;

      console.log('[eCentral] postMessage diterima:', data.type, data.userId || '');

      if (data.type === 'PUSH_INIT' && data.userId) {
        initPush(data.userId);
      }
      if (data.type === 'PUSH_DISABLE') {
        disablePush(data.userId || _currentUserId || '');
      }
    });
  </script>
</body>
</html>
